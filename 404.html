<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Not Found — Vektor.Works</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

      background: #0d0d0d; color: #f2f2f2;
      font-family: 'Roboto Condensed', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
    }
    .code { font-weight: 900; font-size: clamp(4rem, 15vw, 8rem); line-height: 1; color: #0291cf; }

    a {
      display: inline-block; font-weight: 700; font-size: 0.82rem; letter-spacing: 0.18em;
      text-transform: uppercase; background: #0291cf; color: #fff;
      padding: 14px 32px; text-decoration: none; transition: background 0.2s;
    }
    a:hover { background: #0278ac; }

</head>
<body>
  <div>
    <div class="code">404</div>
    <h1>Page Not Found</h1>
